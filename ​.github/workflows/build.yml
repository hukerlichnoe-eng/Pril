name: Сборка ЖД Комплекса APK v15.0

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4

    - name: Установка Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Установка Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Установка Java (JDK)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Подготовка окружения и генерация конфигурации
      run: |
        # Создаем пустой manifest.json, если его вдруг нет в корне
        if [ ! -f manifest.json ]; then
          echo '{"name":"Бортовой Комплекс БЧ","short_name":"БК БЧ","start_url":"/index.html","display":"standalone","background_color":"#0d0e12","theme_color":"#16181f","orientation":"portrait","icons":[{"src":"https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png","sizes":"512x512","type":"image/png"}]}' > manifest.json
        fi

        # Принудительно создаем готовый twa-manifest.json, чтобы Bubblewrap не задавал вопросы в консоли
        echo '{"packageId":"com.bch.railwayapp","host":"localhost","name":"Бортовой Комплекс БЧ","short_name":"БК БЧ","themeColor":"#16181f","navigationColor":"#0d0e12","backgroundColor":"#0d0e12","startUrl":"/index.html","iconUrl":"https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png","maskableIconUrl":"https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png","clockwiseColors":false,"features":{"backgroundLocation":true},"alphaDependencies":true,"display":"standalone","orientation":"portrait","scionEnabled":false,"shortcuts":[],"splashScreenFadeOutDuration":300,"webManifestUrl":"https://localhost/manifest.json","fallbackType":"customtabs","editorVersion":1}' > twa-manifest.json

    - name: Компиляция нативного Android проекта
      run: |
        # Запуск генерации проекта без интерактивных вопросов
        bubblewrap update --meta=twa-manifest.json || bubblewrap generate --meta=twa-manifest.json --skipKeygen
        
        # Финальная сборка APK
        bubblewrap build --skipKeygen || true

    - name: Выгрузка готового APK в артефакты
      uses: actions/upload-artifact@v4
      with:
        name: Railway_BCH_v15_App
        path: |
          ./*.apk
          ./build-twa/**/*.apk
