name: Build Mobile APK

on:
  push:
    branches: [ main, master, основной ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Clean and Compile Android Project
      run: |
        rm -rf app_workspace
        cordova create app_workspace com.assistant.bg TrainHelper
        cd app_workspace
        cordova platform add android
        
        # Очищаем дефолтную папку www и копируем твой index.html
        rm -rf www/*
        cp ../index.html www/index.html
        
        # Перезаписываем config.xml встроенным рабочим шаблоном с GPS-плагином
        cat <<EOF > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.assistant.bg" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>Помощник Машиниста</name>
            <description>Контроль профиля БЧ, GPS навигация и ТУ-3</description>
            <author email="support@helper.com">Машинист</author>
            <content src="index.html" />
            <preference name="KeepRunning" value="true" />
            <preference name="AllowInlineMediaPlayback" value="true" />
            <plugin name="cordova-plugin-geolocation" spec="^4.1.0" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
        </widget>
        EOF
        
        cordova build android --no-telemetry

    - name: Upload Final APK
      uses: actions/upload-artifact@v4
      with:
        name: Помощник_Машиниста_БЧ
        path: app_workspace/platforms/android/app/build/outputs/apk/debug/*.apk
