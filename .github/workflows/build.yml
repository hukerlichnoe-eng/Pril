name: Build Mobile APK

on:
  push:
    branches: [ main, master, основной ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Clean and Compile Android Project
      run: |
        rm -rf app_workspace
        cordova create app_workspace com.lokomotiv.helper TrainHelper
        cd app_workspace
        cordova platform add android
        rm -rf www/*
        cp ../index.html www/index.html
        cp ../config.xml config.xml
        cordova build android --no-telemetry

    - name: Upload Final APK
      uses: actions/upload-artifact@v4
      with:
        name: driver-assistant-apk
        path: app_workspace/platforms/android/app/build/outputs/apk/debug/app-debug.apk
