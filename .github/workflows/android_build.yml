name: Генерация Бортового Комплекса APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  android-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Инициализация репозитория
      uses: actions/checkout@v4

    - name: Настройка Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Установка Cordova
      run: npm install -g cordova

    - name: Настройка Java для Android SDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Создание нативного Android каркаса
      run: |
        # Создаем чистый проект без конфликтов конфигурации
        cordova create android-build com.bch.helper "BCH_Helper"
        cd android-build
        cordova platform add android --noscript
        
        # Переносим файлы интерфейса v15 в рабочую директорию сборщика
        rm -rf www/*
        cp ../index.html www/
        cp ../manifest.json www/ || true

    - name: Прямая инъекция прав GPS в AndroidManifest
      run: |
        cd android-build/platforms/android/app/src/main
        
        # Добавляем стандартные разрешения Android для спутников прямо в XML
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />' AndroidManifest.xml

    - name: Финальная компиляция APK файла
      run: |
        cd android-build
        # Собираем дебаг-версию (она компилируется без требования цифровой подписи)
        cordova build android --device --debug
        
        # Переносим готовый файл в корень
        cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../помощник_бч_v15.apk

    - name: Отправка готового APK в Артефакты GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Приложение_БЧ_v15_Вагоны_ТРА
        path: ./помощник_бч_v15.apk
