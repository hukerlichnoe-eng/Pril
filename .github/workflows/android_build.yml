name: Генерация Бортового Комплекса APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  android-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Инициализация репозитория
      uses: actions/checkout@v4

    - name: Настройка Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Установка инструментов компиляции
      run: npm install -g cordova

    - name: Создание нативного Android каркаса
      run: |
        cordova create android-build com.bch.helper "Бортовой Помощник"
        cd android-build
        cordova platform add android --noscript
        
        # Переносим файлы интерфейса v15 в сборщик
        rm -rf www/*
        cp ../index.html www/
        cp ../manifest.json www/ || true
        
        # Настройка разрешений высокой точности GPS (Геолокация БЧ)
        echo '<widget id="com.bch.helper"><plugin name="cordova-plugin-geolocation" spec="^5.0.0"><variable name="GPS_REQUIRED" value="true" /></plugin></widget>' > config.xml

    - name: Настройка Java для Android SDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Финальная компиляция APK файла
      run: |
        cd android-build
        cordova build android --device --release || cordova build android --device
        
        # Вытаскиваем готовый APK в корень для отправки
        cp platform/android/app/build/outputs/apk/release/*.apk ../помощник_бч_v15.apk || cp platforms/android/app/build/outputs/apk/debug/*.apk ../помощник_бч_v15.apk || true

    - name: Отправка готового APK в Артефакты GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Приложение_БЧ_v15_Вагоны_ТРА
        path: ./*.apk
