<script>
// ===== ИНИЦИАЛИЗАЦИЯ =====
const map = L.map('map', { zoomControl: false }).setView([53.9, 27.56], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

let trainMarker = L.circleMarker([53.9, 27.56], {color: '#e63946', radius: 8, fillColor: '#ffb703', fillOpacity: 0.9}).addTo(map);
let trainPolyline = L.polyline([], {color: '#e63946', weight: 5}).addTo(map);

const canvas = document.getElementById('profileCanvas');
const ctx = canvas.getContext('2d');

// ===== ПЕРЕМЕННЫЕ =====
let routeNodes = [];
let terrain = [];
let objectsDb = [];
let tu3Db = [];
let trainX = 0;
let trainCars = 43;
let trainLength = 602;
let isManualMode = true;
let isReversed = false;
let gpsStatus = "Ожидание";let isMapUserLocked = false;
let startKm = 827;
let startPk = 8;
let kmDirection = "up";
let watchId = null;
let audioEnabled = false;
let audioElements = {};

// ===== АУДИО СИСТЕМА =====
const audioFiles = {
    vstavka: 'audio/vstavka.mp3',
    speed: 'audio/speed.mp3',
    signal: 'audio/signal.mp3',
    crossing: 'audio/crossing.mp3'
};

// Предзагрузка аудио
function preloadAudio() {
    Object.keys(audioFiles).forEach(type => {
        const audio = new Audio();
        audio.preload = 'auto';
        audio.src = audioFiles[type];
        audioElements[type] = audio;
    });
}

function playAudio(type) {
    if (!audioEnabled) {
        console.log('Аудио не активировано');
        return;
    }
    
    const audio = audioElements[type];
    if (!audio) {
        console.error('Аудио не найдено:', type);
        return;
    }
    
    audio.currentTime = 0;
    audio.play().then(() => {
        console.log('Воспроизводится:', type);
        updateTelemetry(`🔊 ${type}`, 'success');
    }).catch(err => {
        console.error('Ошибка воспроизведения:', err);
        updateTelemetry(`⚠️ Ошибка аудио: ${err.message}`, 'error');
    });
}

function activateAudio() {
    if (audioEnabled) {        updateTelemetry('✅ Аудио уже включено', 'success');
        return;
    }
    
    // Пробуем активировать аудио
    try {
        // Разблокировка аудио контекста
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
            const ctx = new AudioContext();
            ctx.resume();
        }
        
        // Предзагрузка
        preloadAudio();
        
        // Тестовое воспроизведение
        const testAudio = new Audio(audioFiles.vstavka);
        testAudio.volume = 0.1;
        testAudio.play().then(() => {
            testAudio.pause();
            audioEnabled = true;
            document.getElementById('audioBadge').className = 'badge badge-ok';
            document.getElementById('audioBadge').textContent = '🔊 Вкл';
            updateTelemetry('✅ ИНФОРМАТОР АКТИВИРОВАН', 'success');
            speak('Информатор активирован');
            startGpsWatch();
            requestWakeLock();
        }).catch(err => {
            console.error('Ошибка активации:', err);
            updateTelemetry('⚠️ Ошибка: ' + err.message, 'error');
        });
    } catch (e) {
        updateTelemetry('⚠️ Ошибка: ' + e.message, 'error');
    }
}

// ===== GPS =====
function startGpsWatch() {
    if (watchId) navigator.geolocation.clearWatch(watchId);
    
    watchId = navigator.geolocation.watchPosition(
        (pos) => {
            if (isManualMode) return;
            
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            document.getElementById('gpsHeartbeatBadge').className = 'badge badge-ok';
            document.getElementById('gpsHeartbeatBadge').textContent = '📡 GPS';            
            if (routeNodes.length > 0) {
                let minDist = Infinity;
                let bestMeter = 0;
                
                routeNodes.forEach((node, idx) => {
                    const d = getDistance(lat, lon, node.lat, node.lon);
                    if (d < minDist) {
                        minDist = d;
                        bestMeter = node.meterMark;
                    }
                });
                
                trainX = isReversed ? (terrain.length - 1 - bestMeter) : bestMeter;
                updateTrainPosition();
                
                // Проверка объектов
                checkObjects();
            }
            
            gpsStatus = `GPS: ${pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(1) : 0} км/ч`;
            updateTelemetryDisplay();
        },
        (err) => {
            gpsStatus = 'Ошибка GPS';
            updateTelemetry('⚠️ ' + err.message, 'error');
        },
        {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        }
    );
}

function checkObjects() {
    objectsDb.forEach(obj => {
        if (!document.getElementById(`voice_${obj.type}`)?.checked) return;
        
        const dist = obj.meterMark - trainX;
        
        if (dist >= 450 && dist <= 550 && !obj.spoken) {
            playAudio(obj.type);
            speak(`Внимание, через 500 метров ${obj.name}`);
            obj.spoken = true;
        }
        
        if (Math.abs(dist) > 700) {
            obj.spoken = false;
        }    });
}

// ===== ГЕОМЕТРИЯ =====
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ===== ЗАГРУЗКА ФАЙЛОВ =====
function loadRouteFile(input) {
    const file = input.files[0];
    if (!file) return;
    
    updateTelemetry('⏳ Загрузка...', 'info');
    document.getElementById('file-info').innerHTML = '<span style="color:#0077b6">⏳ Чтение файла...</span>';
    
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const content = e.target.result;
            const fileName = file.name.toLowerCase();
            
            if (fileName.endsWith('.gpx')) {
                parseGPX(content);
            } else if (fileName.endsWith('.geojson') || fileName.endsWith('.json')) {
                parseGeoJSON(content);
            } else {
                throw new Error('Неподдерживаемый формат');
            }
        } catch (err) {
            console.error('Ошибка парсинга:', err);
            document.getElementById('file-info').innerHTML = `<span class="error-msg">❌ ${err.message}</span>`;
            updateTelemetry('❌ Ошибка файла', 'error');
        }
    };
    
    reader.onerror = () => {
        document.getElementById('file-info').innerHTML = '<span class="error-msg">❌ Ошибка чтения</span>';
    };
    
    reader.readAsText(file);
}

function parseGPX(text) {
    const parser = new DOMParser();    const xml = parser.parseFromString(text, 'text/xml');
    
    // Проверка на ошибки парсинга XML
    const parseError = xml.querySelector('parsererror');
    if (parseError) {
        throw new Error('Неверный формат GPX');
    }
    
    const points = [];
    const trkpts = xml.getElementsByTagName('trkpt');
    
    for (let i = 0; i < trkpts.length; i++) {
        const lat = parseFloat(trkpts[i].getAttribute('lat'));
        const lon = parseFloat(trkpts[i].getAttribute('lon'));
        const eleNode = trkpts[i].getElementsByTagName('ele')[0];
        const ele = eleNode ? parseFloat(eleNode.textContent) : 150;
        
        if (!isNaN(lat) && !isNaN(lon)) {
            points.push({ lat, lon, ele });
        }
    }
    
    if (points.length < 2) {
        throw new Error('Файл не содержит точек маршрута');
    }
    
    processRoutePoints(points);
}

function parseGeoJSON(text) {
    const json = JSON.parse(text);
    const points = [];
    
    const extractCoords = (coords) => {
        if (Array.isArray(coords[0]) && Array.isArray(coords[0][0])) {
            coords.flat(2).forEach(c => {
                if (c.length >= 2) {
                    points.push({ lat: c[1], lon: c[0], ele: c[2] || 150 });
                }
            });
        } else {
            coords.forEach(c => {
                if (c.length >= 2) {
                    points.push({ lat: c[1], lon: c[0], ele: c[2] || 150 });
                }
            });
        }
    };
    
    if (json.type === 'FeatureCollection') {        json.features.forEach(f => {
            if (f.geometry) extractCoords(f.geometry.coordinates);
        });
    } else if (json.type === 'Feature') {
        if (json.geometry) extractCoords(json.geometry.coordinates);
    } else if (json.type === 'LineString') {
        extractCoords(json.coordinates);
    }
    
    if (points.length < 2) {
        throw new Error('Файл не содержит точек маршрута');
    }
    
    processRoutePoints(points);
}

function processRoutePoints(points) {
    routeNodes = [];
    terrain = [];
    let totalM = 0;
    
    for (let i = 0; i < points.length; i++) {
        if (i > 0) {
            totalM += getDistance(points[i-1].lat, points[i-1].lon, points[i].lat, points[i].lon);
        }
        routeNodes.push({
            lat: points[i].lat,
            lon: points[i].lon,
            height: points[i].ele,
            meterMark: totalM
        });
    }
    
    // Интерполяция рельефа
    let idx = 0;
    for (let m = 0; m <= totalM; m++) {
        while (idx < routeNodes.length - 1 && routeNodes[idx+1].meterMark < m) idx++;
        
        const p1 = routeNodes[idx];
        const p2 = routeNodes[idx+1] || p1;
        
        if (p2.meterMark === p1.meterMark) {
            terrain.push(p1.height);
        } else {
            const ratio = (m - p1.meterMark) / (p2.meterMark - p1.meterMark);
            terrain.push(p1.height + ratio * (p2.height - p1.height));
        }
    }
    
    // Отображение на карте    if (window.mapPolyline) map.removeLayer(window.mapPolyline);
    window.mapPolyline = L.polyline(routeNodes.map(n => [n.lat, n.lon]), {
        color: '#0077b6',
        weight: 4,
        opacity: 0.7
    }).addTo(map);
    
    map.fitBounds(window.mapPolyline.getBounds(), { padding: [20, 20] });
    
    document.getElementById('manualMeterSlider').max = Math.round(totalM);
    document.getElementById('file-info').innerHTML = `<span class="success-msg">✅ Загружено: ${(totalM/1000).toFixed(2)} км, ${points.length} точек</span>`;
    
    updateTelemetry(`✅ Маршрут загружен: ${(totalM/1000).toFixed(2)} км`, 'success');
    
    trainX = 0;
    updateTrainPosition();
    drawProfile();
}

// ===== ОТРИСОВКА =====
function updateTrainPosition() {
    if (routeNodes.length === 0) return;
    
    const maxM = terrain.length - 1;
    const headM = isReversed ? (maxM - trainX) : trainX;
    const idx = Math.min(routeNodes.length - 1, Math.floor((headM / maxM) * routeNodes.length));
    const pos = [routeNodes[idx].lat, routeNodes[idx].lon];
    
    trainMarker.setLatLng(pos);
    if (!isMapUserLocked) map.panTo(pos, { animate: true });
    
    document.getElementById('manualMeterInput').value = Math.round(trainX);
    document.getElementById('manualMeterSlider').value = Math.round(trainX);
}

function drawProfile() {
    if (terrain.length === 0) {
        ctx.fillStyle = '#666';
        ctx.font = '12px sans-serif';
        ctx.fillText('Загрузите маршрут', 200, 70);
        requestAnimationFrame(drawProfile);
        return;
    }
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const viewM = 3000;
    const scale = viewM / canvas.width;
    const offset = trainX - viewM / 2;
    const maxM = terrain.length - 1;    
    // Поиск мин/макс высоты
    let minH = Infinity, maxH = -Infinity;
    for (let x = 0; x < canvas.width; x++) {
        const m = Math.floor(offset + x * scale);
        if (m >= 0 && m < terrain.length) {
            const h = terrain[m];
            if (h < minH) minH = h;
            if (h > maxH) maxH = h;
        }
    }
    
    if (maxH - minH < 20) { minH -= 10; maxH += 10; }
    const hRange = maxH - minH;
    
    const getY = (m) => {
        if (m < 0 || m >= terrain.length) return canvas.height - 20;
        return canvas.height - ((terrain[m] - minH) / hRange) * (canvas.height - 40) - 20;
    };
    
    // Сетка
    ctx.strokeStyle = '#e1e4e8';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x < canvas.width; x += 50) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
    }
    ctx.stroke();
    
    // Профиль
    ctx.strokeStyle = '#0077b6';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = 0; x < canvas.width; x++) {
        const m = Math.floor(offset + x * scale);
        if (x === 0) ctx.moveTo(x, getY(m));
        else ctx.lineTo(x, getY(m));
    }
    ctx.stroke();
    
    // Поезд
    const centerX = canvas.width / 2;
    const centerY = getY(trainX);
    ctx.fillStyle = isManualMode ? '#ff9f1c' : '#e63946';
    ctx.beginPath();
    ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
    ctx.fill();
    
    requestAnimationFrame(drawProfile);}

// ===== УТИЛИТЫ =====
function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ru-RU';
        u.rate = 0.95;
        window.speechSynthesis.speak(u);
    }
}

function updateTelemetry(msg, type) {
    const el = document.getElementById('telemetry');
    const colors = { success: '#2a9d8f', error: '#e63946', info: '#0077b6' };
    el.style.borderLeftColor = colors[type] || colors.info;
    el.innerHTML = msg.replace(/\n/g, '<br>');
}

function updateTelemetryDisplay() {
    const km = Math.floor(trainX / 1000);
    const pk = Math.floor((trainX % 1000) / 100) + 1;
    document.getElementById('telemetry').innerHTML = `
        🛰️ <b>${gpsStatus}</b><br>
        📍 <b>${km} км ${pk} пк</b> (${Math.round(trainX)} м)<br>
        🚃 ${trainCars} ваг. (${trainLength} м) | 📋 ${objectsDb.length} объектов
    `;
}

async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            await navigator.wakeLock.request('screen');
            document.getElementById('wakeLockBadge').className = 'badge badge-ok';
            document.getElementById('wakeLockBadge').textContent = '🔋 No Sleep';
        }
    } catch (e) {}
}

// ===== ОБЪЕКТЫ =====
function addCustomTraObject() {
    const name = document.getElementById('manualObjName').value.trim();
    const km = parseInt(document.getElementById('manualObjKm').value);
    const pk = parseInt(document.getElementById('manualObjPk').value);
    const type = document.getElementById('manualObjType').value;
    
    if (!name || !routeNodes.length) {
        updateTelemetry('⚠️ Заполните поля и загрузите маршрут', 'error');
        return;    }
    
    const meterMark = (km * 1000) + ((pk - 1) * 100);
    const idx = Math.min(routeNodes.length - 1, Math.floor((meterMark / (terrain.length || 1)) * routeNodes.length));
    const node = routeNodes[idx] || routeNodes[0];
    
    const colors = { vstavka: '#ffb703', speed: '#e63946', signal: '#0077b6', crossing: '#f4a261' };
    
    objectsDb.push({
        name, type, meterMark,
        lat: node.lat, lon: node.lon,
        color: colors[type], spoken: false
    });
    
    localStorage.setItem('bch_tra_db', JSON.stringify(objectsDb));
    renderTraTable();
    document.getElementById('manualObjName').value = '';
    updateTelemetry(`✅ Добавлено: ${name}`, 'success');
}

function fixObjectInCurrentPoint(type, name) {
    if (!routeNodes.length) {
        updateTelemetry('⚠️ Загрузите маршрут', 'error');
        return;
    }
    
    const maxM = terrain.length - 1;
    const meterMark = isReversed ? (maxM - trainX) : trainX;
    const idx = Math.min(routeNodes.length - 1, Math.floor((meterMark / maxM) * routeNodes.length));
    const node = routeNodes[idx];
    
    const colors = { vstavka: '#ffb703', speed: '#e63946', signal: '#0077b6', crossing: '#f4a261' };
    
    objectsDb.push({
        name, type, meterMark,
        lat: node.lat, lon: node.lon,
        color: colors[type], spoken: false
    });
    
    localStorage.setItem('bch_tra_db', JSON.stringify(objectsDb));
    renderTraTable();
    speak(`Зафиксировано: ${name}`);
}

function renderTraTable() {
    const tbody = document.querySelector('#objectsTraTable tbody');
    tbody.innerHTML = '';
    
    objectsDb.sort((a,b) => a.meterMark - b.meterMark).forEach((obj, i) => {
        const km = Math.floor(obj.meterMark / 1000);        const pk = Math.floor((obj.meterMark % 1000) / 100) + 1;
        tbody.innerHTML += `
            <tr>
                <td style="color:${obj.color}">${obj.name}</td>
                <td>${km} км ${pk} пк</td>
                <td><button class="btn btn-danger" style="padding:4px 8px;margin:0;font-size:11px;" onclick="removeObject(${i})">✕</button></td>
            </tr>
        `;
    });
}

function removeObject(i) {
    objectsDb.splice(i, 1);
    localStorage.setItem('bch_tra_db', JSON.stringify(objectsDb));
    renderTraTable();
}

function clearObjectsDb() {
    if (confirm('Очистить все объекты?')) {
        objectsDb = [];
        localStorage.removeItem('bch_tra_db');
        renderTraTable();
    }
}

// ===== ТУ-3 =====
function calculateAndSaveTrip() {
    const date = document.getElementById('tuDate').value;
    const yavka = document.getElementById('tuTimeYavka').value;
    const sdacha = document.getElementById('tuTimeSdacha').value;
    const dest = document.getElementById('tuDestination').value || 'Не указано';
    
    if (!date || !yavka || !sdacha) {
        updateTelemetry('⚠️ Заполните все поля', 'error');
        return;
    }
    
    const t1 = new Date(`${date}T${yavka}`);
    const t2 = new Date(`${date}T${sdacha}`);
    
    if (t2 < t1) t2.setDate(t2.getDate() + 1);
    
    const totalMin = (t2 - t1) / 60000;
    let nightMin = 0;
    let t = new Date(t1);
    
    while (t < t2) {
        const h = t.getHours();
        if (h >= 22 || h < 6) nightMin++;
        t.setMinutes(t.getMinutes() + 1);    }
    
    const totalH = totalMin / 60;
    const nightH = nightMin / 60;
    const rate = nightMin / totalMin >= 0.5 ? '40%' : '35%';
    
    tu3Db.push({ date, dest, total: totalH, night: nightH, rate });
    localStorage.setItem('bch_tu3_db', JSON.stringify(tu3Db));
    renderTu3Table();
    updateTelemetry('✅ Сохранено в ТУ-3', 'success');
}

function renderTu3Table() {
    const tbody = document.querySelector('#tripsTable tbody');
    tbody.innerHTML = '';
    
    let sumTotal = 0, sumNight = 0;
    
    tu3Db.forEach(t => {
        tbody.innerHTML += `
            <tr>
                <td>${t.date}</td>
                <td>${t.dest}</td>
                <td>${t.total.toFixed(1)}</td>
                <td>${t.night.toFixed(1)}</td>
            </tr>
        `;
        sumTotal += t.total;
        sumNight += t.night;
    });
    
    document.getElementById('tuStats').innerHTML = `
        Поездок: <b>${tu3Db.length}</b> | 
        Всего: <b>${sumTotal.toFixed(1)} ч</b> | 
        Ночных: <b>${sumNight.toFixed(1)} ч</b>
    `;
}

// ===== НАСТРОЙКИ =====
function updateKilometerSettings() {
    startKm = parseInt(document.getElementById('startKmInput').value) || 0;
    startPk = parseInt(document.getElementById('startPkInput').value) || 1;
    kmDirection = document.getElementById('kmDirectionSelect').value;
    
    localStorage.setItem('bch_km_start', startKm);
    localStorage.setItem('bch_pk_start', startPk);
    localStorage.setItem('bch_km_dir', kmDirection);
    
    updateTelemetry('✅ Настройки сохранены', 'success');
}
function toggleReverse() {
    isReversed = !isReversed;
    trainX = (terrain.length - 1) - trainX;
    if (trainX < 0) trainX = 0;
    updateTrainPosition();
    speak('Реверс направления');
}

function updateTrainLength(val) {
    trainCars = parseInt(val) || 1;
    trainLength = trainCars * 14;
    document.getElementById('trainCarsInput').value = trainCars;
    document.getElementById('trainCarsSlider').value = trainCars;
    document.getElementById('calculatedLengthText').textContent = `Длина: ${trainLength} м`;
}

function centerMapOnTrainHead() {
    if (!routeNodes.length) return;
    const maxM = terrain.length - 1;
    const headM = isReversed ? (maxM - trainX) : trainX;
    const idx = Math.min(routeNodes.length - 1, Math.floor((headM / maxM) * routeNodes.length));
    map.panTo([routeNodes[idx].lat, routeNodes[idx].lon], { animate: true });
}

function clearTu3Db() {
    if (confirm('Очистить журнал ТУ-3?')) {
        tu3Db = [];
        localStorage.removeItem('bch_tu3_db');
        renderTu3Table();
    }
}

// ===== СОБЫТИЯ =====
document.getElementById('manualMeterInput').addEventListener('input', (e) => {
    trainX = parseFloat(e.target.value) || 0;
    updateTrainPosition();
});

document.getElementById('manualMeterSlider').addEventListener('input', (e) => {
    trainX = parseFloat(e.target.value) || 0;
    document.getElementById('manualMeterInput').value = trainX;
    updateTrainPosition();
});

document.getElementById('trainCarsInput').addEventListener('input', (e) => {
    updateTrainLength(e.target.value);
});

document.getElementById('trainCarsSlider').addEventListener('input', (e) => {    updateTrainLength(e.target.value);
});

map.on('dragstart zoomstart', () => {
    isMapUserLocked = true;
    setTimeout(() => { isMapUserLocked = false; }, 5000);
});

// ===== ИНИЦИАЛИЗАЦИЯ =====
window.onload = () => {
    // Загрузка настроек
    if (localStorage.getItem('bch_km_start')) {
        startKm = parseInt(localStorage.getItem('bch_km_start'));
        startPk = parseInt(localStorage.getItem('bch_pk_start'));
        kmDirection = localStorage.getItem('bch_km_dir') || 'up';
        
        document.getElementById('startKmInput').value = startKm;
        document.getElementById('startPkInput').value = startPk;
        document.getElementById('kmDirectionSelect').value = kmDirection;
    }
    
    // Загрузка объектов
    if (localStorage.getItem('bch_tra_db')) {
        try {
            objectsDb = JSON.parse(localStorage.getItem('bch_tra_db'));
            renderTraTable();
        } catch(e) {}
    }
    
    // Загрузка ТУ-3
    if (localStorage.getItem('bch_tu3_db')) {
        try {
            tu3Db = JSON.parse(localStorage.getItem('bch_tu3_db'));
            renderTu3Table();
        } catch(e) {}
    }
    
    // Дата по умолчанию
    document.getElementById('tuDate').value = new Date().toISOString().split('T')[0];
    
    // Тихая инициализация speech
    if ('speechSynthesis' in window) {
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
    }
    
    drawProfile();
    updateTelemetry('Готов к работе', 'info');
};
</script>
